changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "📚 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🧱 Maintenance"
      labels:
        - "chore"
        - "refactor"
        - "ci"
    - title: "Other Changes"
      labels:
        - "*"
