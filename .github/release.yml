changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🛡️ Security & Safety"
      labels:
        - security
        - safety
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧪 Tests & CI"
      labels:
        - tests
        - ci
    - title: "🧰 Maintenance"
      labels:
        - chore
        - dependencies
